<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topcaffeind Coffee</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: #f4ece0;
  color: #000;
  text-align: center;
  padding: 2rem;
}

a { color: #000; text-decoration: none; }

header { margin-bottom: 2rem; }
.fancy-header { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; margin: 0; }

.back-btn {
  display: inline-block;
  margin-bottom: 1.5rem;
  padding: 0.5rem 1rem;
  background: #96742a;
  color: #000;
  border-radius: 8px;
  font-weight: 600;
  transition: all 0.3s ease;
}
.back-btn:hover { background: #db8137; transform: scale(1.05); color: #000; }

#toggle-cart {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1100;
  padding: 6px 12px;
  background:#96742a;
  color:#000;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
}

.checkout {
  position: fixed;
  top: 60px;
  right: 20px;
  background: #f8e5e5;
  padding: 0.5rem 0.8rem;
  border-radius: 8px;
  width: 220px;
  font-size: 0.8rem;
  z-index: 100;
  color: #000;
  display: flex;
  flex-direction: column;
  max-height: 300px;

  /* Slide animation */
  transform: translateX(120%);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.35s ease, opacity 0.35s ease;
}



.checkout.show {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
}

.checkout-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.3rem;
}

#close-cart {
  background: none;
  border: none;
  font-size: 1.8rem; /* bigger size */
  cursor: pointer;
  font-weight: 700;
  color: #000;
  padding: 0 0.2rem; /* optional, makes it easier to click */
  line-height: 1;
}


#cart-items {
  list-style: none;
  padding-left: 0.5rem;
  margin: 0.2rem 0 0.2rem 0;
  overflow-y: auto;
  flex-grow: 1;
}

#cart-items li { margin: 0.2rem 0; font-size: 0.8rem; }

#cart-total { font-weight: 700; }

#checkout-btn {
  width: 100%;
  padding: 0.3rem 0;
  background: #96742a;
  color: #000;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 0.3rem;
}

.product-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 2rem;
}

.product-card {
  background: #fff3e0;
  border-radius: 20px;
  padding: 1.5rem;
  text-align: center;
  width: 260px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
  color: #000;
}

.product-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

.product-card h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #000; }
.product-card p { margin: 0.3rem 0; font-size: 1.1rem; }

button.buy {
  margin-top: 1rem;
  padding: 0.8rem 1.5rem;
  background: #96742a;
  color: #000;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.3s ease;
}
button.buy:hover { background: #db8137; transform: scale(1.05); color: #000; }

footer { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: #000; }
</style>
</head>
<body>

<header>
  <h1 class="fancy-header">Beans</h1>
</header>

<a href="Bindex.html" class="back-btn">← Back to Main</a>

<button id="toggle-cart">Cart</button>

<section class="checkout">
  <div class="checkout-header">
    <h2>Your Cart</h2>
    <button id="close-cart">×</button>
  </div>
  <ul id="cart-items"><li>No items in the cart yet.</li></ul>
  <p>Total: £<span id="cart-total">0.00</span></p>
  <button id="checkout-btn">Checkout</button>
</section>

<main>
  <div class="product-row">
    <div class="product-card"><h2>Coffee Blend A</h2><img src="dark.png" width="120"><p>Rich aromatic beans</p><p>250g – £9.99</p><button class="buy">Buy Now</button></div>
    <div class="product-card"><h2>Coffee Blend B</h2><img src="dark.png" width="120"><p>Decaf smooth & mellow</p><p>250g – £9.99</p><button class="buy">Buy Now</button></div>
    <div class="product-card"><h2>Coffee Blend C</h2><img src="dark.png" width="120"><p>Promotions blend</p><p>250g – £9.99</p><button class="buy">Buy Now</button></div>
    <div class="product-card"><h2>About / Blend D</h2><img src="dark.png" width="120"><p>Learn more</p><p>–</p><button class="buy">Buy Now</button></div>
  </div>
</main>

<footer>© 2026 Topcaffeind</footer>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartItems = document.getElementById('cart-items');
const cartTotal = document.getElementById('cart-total');
const checkout = document.querySelector('.checkout');
const toggleBtn = document.getElementById('toggle-cart');
const closeBtn = document.getElementById('close-cart');
let hideTimeout;

function updateCartDisplay() {
    cartItems.innerHTML = '';
    let total = 0;

    if (cart.length === 0) {
        cartItems.innerHTML = '<li>No items in the cart yet.</li>';
    } else {
        cart.forEach((item, index) => {
            const li = document.createElement('li');
            li.style.display = 'flex';
            li.style.justifyContent = 'space-between';
            li.style.alignItems = 'center';
            li.style.marginBottom = '6px';

            const itemText = document.createElement('span');
            itemText.textContent = `${item.name} – £${item.price.toFixed(2)}`;

            const removeBtn = document.createElement('button');
            removeBtn.textContent = '✕';
            removeBtn.style.background = '#5d4037';
            removeBtn.style.color = '#fff';
            removeBtn.style.border = 'none';
            removeBtn.style.borderRadius = '4px';
            removeBtn.style.fontSize = '0.7rem';
            removeBtn.style.cursor = 'pointer';
            removeBtn.style.padding = '2px 6px';

            removeBtn.addEventListener('click', () => {
                cart.splice(index, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartDisplay();
            });

            li.appendChild(itemText);
            li.appendChild(removeBtn);
            cartItems.appendChild(li);

            total += item.price;
        });
    }

    cartTotal.textContent = total.toFixed(2);
}

// Add to cart
document.querySelectorAll('.buy').forEach(btn => {
  btn.addEventListener('click', e => {
    e.preventDefault();
    const card = btn.closest('.product-card');
    const name = card.querySelector('h2').innerText;
    const price = 9.99;
    cart.push({name, price});
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartDisplay();
  });
});

// Show cart with auto-hide
function showCart() {
  checkout.classList.add('show');
  if(hideTimeout) clearTimeout(hideTimeout);
  hideTimeout = setTimeout(() => checkout.classList.remove('show'), 5000);
}
toggleBtn.addEventListener('click', showCart);

// Manual close
closeBtn.addEventListener('click', () => {
  checkout.classList.remove('show');
  if(hideTimeout) clearTimeout(hideTimeout);
});

document.getElementById('checkout-btn').addEventListener('click', () => {
  if(cart.length > 0){
    window.location.href = "checkout.html";
  } else {
    alert('Your cart is empty!');
  }
});

updateCartDisplay();
</script>

</body>
</html>
